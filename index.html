<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הוצאות משותפות</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1b2a; color: #fff; min-height: 100vh; }
  .header { background: #1a237e; padding: 16px; text-align: center; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
  .tabs { display: flex; background: #111d2e; border-bottom: 2px solid #1a237e; }
  .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 14px; color: #aaa; transition: all 0.2s; }
  .tab.active { color: #FFD700; border-bottom: 3px solid #FFD700; font-weight: bold; }
  .page { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }

  /* כרטיס */
  .card { background: #1a2a3a; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card h3 { font-size: 16px; margin-bottom: 12px; color: #FFD700; }

  /* טופס */
  label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; margin-top: 10px; }
  input, select { width: 100%; padding: 10px; background: #0d1b2a; border: 1px solid #1a237e; border-radius: 8px; color: #fff; font-size: 15px; }
  input:focus, select:focus { outline: none; border-color: #FFD700; }
  select option { background: #1a2a3a; }
  .btn { width: 100%; padding: 14px; background: #1a237e; color: #FFD700; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 16px; }
  .btn:hover { background: #283593; }
  .btn-red { background: #8B0000; color: #fff; }
  .btn-red:hover { background: #a00000; }

  /* רשימת הוצאות */
  .expense-item { background: #1a2a3a; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .expense-info { flex: 1; }
  .expense-desc { font-size: 15px; font-weight: bold; }
  .expense-meta { font-size: 12px; color: #aaa; margin-top: 3px; }
  .expense-amount { font-size: 18px; font-weight: bold; color: #4CAF50; white-space: nowrap; margin-right: 10px; }
  .expense-amount.negative { color: #f44336; }
  .delete-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 18px; padding: 4px 8px; }
  .delete-btn:hover { color: #f44336; }

  /* יתרה */
  .balance-box { text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 16px; }
  .balance-box.even { background: #1a3a2a; }
  .balance-box.owes { background: #1a2a3a; }
  .balance-amount { font-size: 36px; font-weight: bold; margin: 8px 0; }
  .balance-text { font-size: 14px; color: #aaa; }
  .balance-name { color: #FFD700; font-weight: bold; }

  /* סטטיסטיקות */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a237e; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: #aaa; font-size: 14px; }
  .stat-value { font-size: 15px; font-weight: bold; }

  /* כפתורי בחירה */
  .payer-btns { display: flex; gap: 10px; margin-top: 4px; }
  .payer-btn { flex: 1; padding: 10px; border: 2px solid #1a237e; border-radius: 8px; background: transparent; color: #fff; cursor: pointer; font-size: 14px; text-align: center; }
  .payer-btn.selected { border-color: #FFD700; background: #1a237e; color: #FFD700; font-weight: bold; }

  .empty { text-align: center; color: #555; padding: 30px; font-size: 14px; }
  .loading { text-align: center; color: #aaa; padding: 20px; }
  .tag { display: inline-block; background: #1a237e; border-radius: 20px; padding: 2px 10px; font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">💑 הוצאות משותפות</div>

<div class="tabs">
  <div class="tab active" onclick="showPage('add')">➕ הוסף</div>
  <div class="tab" onclick="showPage('list')">📋 רשימה</div>
  <div class="tab" onclick="showPage('balance')">⚖️ יתרה</div>
</div>

<!-- עמוד הוספה -->
<div id="page-add" class="page active">
  <div class="card">
    <h3>הוספת הוצאה חדשה</h3>

    <label>מי שילם?</label>
    <div class="payer-btns">
      <button class="payer-btn selected" id="btn-guy" onclick="selectPayer('גיא')">גיא</button>
      <button class="payer-btn" id="btn-partner" onclick="selectPayer('בת זוג')">בת זוג</button>
    </div>

    <label>תיאור</label>
    <input type="text" id="inp-desc" placeholder="לדוגמה: ארוחת ערב" />

    <label>סכום (₪)</label>
    <input type="number" id="inp-amount" placeholder="0" min="0" step="0.01" />

    <label>קטגוריה</label>
    <select id="inp-cat">
      <option value="אוכל">🍽️ אוכל</option>
      <option value="תחבורה">🚗 תחבורה</option>
      <option value="בילוי">🎉 בילוי</option>
      <option value="קניות">🛒 קניות</option>
      <option value="בריאות">💊 בריאות</option>
      <option value="אחר">📦 אחר</option>
    </select>

    <label>תאריך</label>
    <input type="date" id="inp-date" />

    <button class="btn" onclick="addExpense()">✅ הוסף הוצאה</button>
  </div>
</div>

<!-- עמוד רשימה -->
<div id="page-list" class="page">
  <div id="expenses-list">
    <div class="loading">טוען...</div>
  </div>
</div>

<!-- עמוד יתרה -->
<div id="page-balance" class="page">
  <div id="balance-display">
    <div class="loading">טוען...</div>
  </div>
  <div class="card" id="stats-card" style="display:none">
    <h3>סיכום</h3>
    <div id="stats-content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wanmbztphilocjnotoxu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eFgft39wT6XWF0itNnCItQ_RNmLa7DG';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let selectedPayer = 'גיא';
let allExpenses = [];

// הגדרת תאריך היום
document.getElementById('inp-date').valueAsDate = new Date();

function selectPayer(name) {
  selectedPayer = name;
  document.getElementById('btn-guy').classList.toggle('selected', name === 'גיא');
  document.getElementById('btn-partner').classList.toggle('selected', name === 'בת זוג');
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'list') loadExpenses();
  if (name === 'balance') loadBalance();
}

async function addExpense() {
  const desc = document.getElementById('inp-desc').value.trim();
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const category = document.getElementById('inp-cat').value;
  const date = document.getElementById('inp-date').value;

  if (!desc) { alert('אנא הכנס תיאור'); return; }
  if (!amount || amount <= 0) { alert('אנא הכנס סכום תקין'); return; }
  if (!date) { alert('אנא בחר תאריך'); return; }

  const btn = document.querySelector('#page-add .btn');
  btn.textContent = 'שומר...';
  btn.disabled = true;

  const { error } = await sb.from('expenses').insert({
    description: desc,
    amount: amount,
    category: category,
    paid_by: selectedPayer,
    date: date
  });

  btn.textContent = '✅ הוסף הוצאה';
  btn.disabled = false;

  if (error) {
    alert('שגיאה בשמירה: ' + error.message);
    return;
  }

  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-date').valueAsDate = new Date();
  alert('ההוצאה נשמרה! ✅');
}

async function loadExpenses() {
  document.getElementById('expenses-list').innerHTML = '<div class="loading">טוען...</div>';
  const { data, error } = await sb.from('expenses').select('*').order('date', { ascending: false });

  if (error) {
    document.getElementById('expenses-list').innerHTML = '<div class="empty">שגיאה בטעינה</div>';
    return;
  }

  allExpenses = data || [];
  renderList();
}

function renderList() {
  const el = document.getElementById('expenses-list');
  if (allExpenses.length === 0) {
    el.innerHTML = '<div class="empty">אין הוצאות עדיין<br>הוסף את הראשונה! 💸</div>';
    return;
  }

  el.innerHTML = allExpenses.map(e => `
    <div class="expense-item">
      <div style="display:flex;align-items:center;flex:1">
        <button class="delete-btn" onclick="deleteExpense(${e.id})">🗑️</button>
        <div class="expense-info">
          <div class="expense-desc">${e.description}</div>
          <div class="expense-meta">
            📅 ${e.date} &nbsp;|&nbsp; 👤 ${e.paid_by}
            <br><span class="tag">${e.category}</span>
          </div>
        </div>
      </div>
      <div class="expense-amount">₪${Number(e.amount).toFixed(2)}</div>
    </div>
  `).join('');
}

async function deleteExpense(id) {
  if (!confirm('למחוק הוצאה זו?')) return;
  await sb.from('expenses').delete().eq('id', id);
  loadExpenses();
}

async function loadBalance() {
  const { data, error } = await sb.from('expenses').select('*');
  if (error) return;

  allExpenses = data || [];

  let guyTotal = 0, partnerTotal = 0;
  allExpenses.forEach(e => {
    if (e.paid_by === 'גיא') guyTotal += Number(e.amount);
    else partnerTotal += Number(e.amount);
  });

  const total = guyTotal + partnerTotal;
  const each = total / 2;
  const diff = guyTotal - partnerTotal;
  const balEl = document.getElementById('balance-display');

  if (total === 0) {
    balEl.innerHTML = '<div class="empty">אין הוצאות עדיין</div>';
    document.getElementById('stats-card').style.display = 'none';
    return;
  }

  let balHtml = '';
  if (Math.abs(diff) < 0.01) {
    balHtml = `<div class="balance-box even">
      <div class="balance-amount" style="color:#4CAF50">⚖️ מאוזן!</div>
      <div class="balance-text">שניכם שילמתם שווה בשווה</div>
    </div>`;
  } else if (diff > 0) {
    balHtml = `<div class="balance-box owes">
      <div class="balance-text"><span class="balance-name">בת זוג</span> חייבת ל<span class="balance-name">גיא</span></div>
      <div class="balance-amount" style="color:#FFD700">₪${(diff/2).toFixed(2)}</div>
    </div>`;
  } else {
    balHtml = `<div class="balance-box owes">
      <div class="balance-text"><span class="balance-name">גיא</span> חייב ל<span class="balance-name">בת זוג</span></div>
      <div class="balance-amount" style="color:#FFD700">₪${(Math.abs(diff)/2).toFixed(2)}</div>
    </div>`;
  }

  balEl.innerHTML = balHtml;

  document.getElementById('stats-card').style.display = 'block';
  document.getElementById('stats-content').innerHTML = `
    <div class="stat-row"><span class="stat-label">סה"כ הוצאות</span><span class="stat-value">₪${total.toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-label">גיא שילם</span><span class="stat-value">₪${guyTotal.toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-label">בת זוג שילמה</span><span class="stat-value">₪${partnerTotal.toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-label">חלק כל אחד</span><span class="stat-value">₪${each.toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-label">מספר הוצאות</span><span class="stat-value">${allExpenses.length}</span></div>
  `;
}
</script>
</body>
</html>
